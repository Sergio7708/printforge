<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Заказы — PrintForge</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/printforge/assets/css/style.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/printforge/" class="header-logo">Print<span>Forge</span></a>
    <nav class="header-nav">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/orders.html" class="active">Заказы</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="cart-badge">0</span></button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="breadcrumbs"><a href="/printforge/">Главная</a><span> / </span><span>Заказы</span></div>
  </div>

  <section style="padding-top:0;min-height:60vh">
    <div class="container">
      <h2 class="section-title" style="margin-bottom:32px">Заказы <span class="accent">магазина</span></h2>
      <div id="ordersContainer"><div class="cart-empty">Загрузка...</div></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-links">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/orders.html">Заказы</a>
    </div>
    <p>© 2026 PrintForge — 3D Моделист Конструктор</p>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const orders = JSON.parse(localStorage.getItem('pf_orders') || '[]');
  const el = document.getElementById('ordersContainer');
  if (!orders.length) {
    el.innerHTML = '<div class="cart-empty"><i class="fas fa-clipboard-list" style="font-size:48px;opacity:.3;margin-bottom:16px;display:block"></i><h3 style="font-family:var(--font-heading);color:var(--gold-dark);margin-bottom:8px">Нет заказов</h3><p style="color:var(--text-muted)">Заказы появятся здесь после оформления.</p><a href="/printforge/pages/catalog.html" style="color:var(--gold);display:inline-block;margin-top:16px">Перейти в каталог</a></div>';
    return;
  }
  el.innerHTML = `<div style="margin-bottom:12px;color:var(--text-dim);font-size:14px">Всего заказов: ${orders.length}</div>` +
    orders.map(o => {
      const d = new Date(o.date);
      const ds = d.toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="order-card">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <h3>Заказ #${o.id}</h3>
          <span style="font-size:12px;color:var(--text-dim)">${ds}</span>
        </div>
        <div class="order-items">${o.items.map(i => `${i.title} ×${i.qty} — ${(i.price*i.qty).toLocaleString()} ₽`).join('<br>')}</div>
        <div class="order-total">${o.total.toLocaleString()} ₽</div>
        <div class="order-customer"><strong>${esc(o.name)}</strong> — ${esc(o.phone)}${o.email ? '<br>Email: '+esc(o.email) : ''}${o.addr ? '<br>Адрес: '+esc(o.addr) : ''}${o.comment ? '<br>Комментарий: '+esc(o.comment) : ''}</div>
      </div>`;
    }).join('') +
    `<div style="text-align:center;margin-top:24px"><button onclick="localStorage.removeItem('pf_orders');location.reload()" style="padding:10px 24px;border:1px solid var(--border);background:var(--bg);color:var(--text-muted);border-radius:50px;cursor:pointer;font-size:13px">Очистить историю</button></div>`;
});
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
