<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Каталог — PrintForge</title>
  <meta name="description" content="Каталог 3D-моделей на заказ. Фигурки, игровая техника, оружие, косплей, интерьер. 3D печать в Москве.">
  <link rel="canonical" href="https://sergio7708.github.io/printforge/pages/catalog.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/printforge/assets/css/style.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/printforge/" class="header-logo">PrintForge</a>
    <nav class="header-nav">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/#services">Услуги</a>
      <a href="/printforge/pages/catalog.html" class="active">Каталог</a>
      <a href="/printforge/pages/cart.html">Корзина</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="Корзина">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="mob-toggle" onclick="document.getElementById('nav').classList.toggle('open')" aria-label="Меню">☰</button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="breadcrumbs" id="breadcrumbs"></div>
  </div>

  <section class="catalog-wrap" style="padding-top:0">
    <div class="container">
      <h2 class="section-title reveal" style="margin-bottom:32px">Весь <span class="accent">каталог</span></h2>

      <div class="prod-toolbar reveal">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" placeholder="Поиск в каталоге..." type="search">
        </div>
        <select class="sort-select" id="sortSelect">
          <option value="default">По умолчанию</option>
          <option value="price-asc">Цена ↑</option>
          <option value="price-desc">Цена ↓</option>
          <option value="name">По имени</option>
        </select>
      </div>

      <div class="filter-bar reveal" id="filterBar"></div>
      <div class="prod-count" id="prodCount"></div>
      <div class="prod-grid reveal" id="prodGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<footer class="footer-wrap">
  <div class="container">
    <div class="footer-links">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/#services">Услуги</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/cart.html">Корзина</a>
    </div>
    <p>© 2026 PrintForge — 3D Моделист Конструктор</p>
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)toggleCart()"></div>
<div class="cart-side" id="cartSide">
  <div class="cart-header"><h2>Корзина</h2><button class="cart-close" onclick="toggleCart()">✕</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty">Загрузка...</div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">Итого: <span id="cartTotal">0 ₽</span></div>
    <button class="cart-btn-primary" onclick="checkout()">Оформить заказ</button>
    <button class="cart-btn-secondary" onclick="clearCart()">Очистить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/printforge/assets/js/app.js"></script>
</body>
</html>
