<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Каталог — PrintForge</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/printforge/assets/css/style.css">
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/printforge/" class="header-logo">Print<span>Forge</span></a>
    <nav class="header-nav">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html" class="active">Каталог</a>
      <a href="/printforge/pages/orders.html">Заказы</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="cart-badge">0</span></button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="breadcrumbs"><a href="/printforge/">Главная</a><span> / </span><span>Каталог</span></div>
  </div>

  <section class="catalog-wrap" style="padding-top:0">
    <div class="container">
      <h2 class="section-title" style="margin-bottom:28px">Весь <span class="accent">каталог</span></h2>
      <div class="prod-toolbar reveal">
        <div class="search-wrap"><i class="fas fa-search search-icon"></i><input id="searchInput" placeholder="Поиск..." type="search"></div>
        <select class="sort-select" id="sortSelect"><option value="d">По умолчанию</option><option value="pa">Цена ↑</option><option value="pd">Цена ↓</option><option value="n">По имени</option></select>
      </div>
      <div class="filter-bar reveal" id="filterBar"></div>
      <div class="prod-count" id="prodCount"></div>
      <div class="prod-grid" id="prodGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-links">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/orders.html">Заказы</a>
    </div>
    <p>© 2026 PrintForge — 3D Моделист Конструктор</p>
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)toggleCart()"></div>
<div class="cart-side" id="cartSide">
  <div class="cart-header"><h2>Корзина</h2><button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty">Загрузка...</div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">Итого: <span id="cartTotal">0 ₽</span></div>
    <button class="btn-gold" onclick="showForm()">Оформить заказ</button>
    <button class="btn-ghost" onclick="clearCart()" style="width:100%;margin-top:4px">Очистить</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/printforge/assets/js/app.js?v=8"></script>
</body>
</html>
