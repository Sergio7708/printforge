<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Товар — PrintForge</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="stylesheet" href="/printforge/assets/css/style.css">
<script>if(!location.search.includes('id=')) location.href='/printforge/'</script>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/printforge/" class="header-logo">Print<span>Forge</span></a>
    <nav class="header-nav">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/orders.html">Заказы</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="Корзина"><i class="fas fa-shopping-bag"></i><span class="cart-badge">0</span></button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="breadcrumbs"><a href="/printforge/">Главная</a><span> / </span><a href="/printforge/pages/catalog.html">Каталог</a><span> / </span><span id="prodTitle">Товар</span></div>
  </div>
  <section class="prod-detail" id="productDetail">
    <div class="container">
      <div class="prod-detail-wrap" id="productContent" style="justify-content:center"><div style="padding:60px;color:var(--text-dim)">Загрузка...</div></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-links">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/pages/catalog.html">Каталог</a>
      <a href="/printforge/pages/orders.html">Заказы</a>
    </div>
    <p>© 2026 PrintForge — 3D Моделист Конструктор</p>
  </div>
</footer>

<div class="toast" id="toast"></div>
<script src="/printforge/assets/js/app.js?v=8"></script>
<script>
(async () => {
  const id = parseInt(new URLSearchParams(location.search).get('id'));
  if (!id) return;
  try {
    if (!window.products || !window.products.length) {
      const r = await fetch('https://sergio7708.github.io/jarvis-bot-store/products.json');
      window.products = await r.json();
    }
    const p = window.products.find(x => x.id === id);
    const el = document.getElementById('productContent');
    if (!p) {
      el.innerHTML = '<div style="text-align:center;padding:80px"><h2 style="font-family:var(--font-heading);font-size:40px;color:var(--gold);margin-bottom:12px">404</h2><p style="color:var(--text-muted)">Товар не найден</p><a href="/printforge/pages/catalog.html" style="color:var(--gold);display:inline-block;margin-top:16px">В каталог</a></div>';
      return;
    }
    document.title = `${p.title} — PrintForge`;
    document.getElementById('prodTitle').textContent = p.title;
    const img = p.id <= 30 ? `/printforge/assets/photos/${p.id}.jpg` : `https://sergio7708.github.io/jarvis-bot-store${p.photo_url}`;
    el.innerHTML = `
      <div class="prod-detail-img reveal"><img src="${img}" alt="${p.title.replace(/"/g,'&quot;')}"></div>
      <div class="prod-detail-info reveal">
        <a href="/printforge/pages/catalog.html" class="prod-back"><i class="fas fa-arrow-left"></i> Назад</a>
        <div class="prod-detail-cat">${p.category}</div>
        <h1>${p.title}</h1>
        <p class="prod-detail-desc">${p.desc || 'Подробности по запросу'}</p>
        <div class="prod-detail-price">${p.price.toLocaleString()} ₽</div>
        <button class="prod-detail-btn" onclick="addCart(${p.id})"><i class="fas fa-shopping-bag"></i> В корзину</button>
      </div>`;
  } catch(e) {
    document.getElementById('productContent').innerHTML = '<div style="padding:80px;text-align:center;color:var(--text-dim)">Ошибка загрузки</div>';
  }
})();
</script>
</body>
</html>
