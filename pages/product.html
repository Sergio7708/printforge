<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Товар — PrintForge</title>
  <link rel="canonical" href="https://sergio7708.github.io/printforge/pages/product.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/printforge/assets/css/style.css">
  <script>
    // Redirect if no id param
    const params = new URLSearchParams(window.location.search);
    if (!params.has('id')) window.location.href = '/printforge/';
  </script>
</head>
<body>

<header class="header" id="header">
  <div class="container">
    <a href="/printforge/" class="header-logo">PrintForge</a>
    <nav class="header-nav" id="nav">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/#catalog">Каталог</a>
      <a href="/printforge/pages/cart.html">Корзина</a>
    </nav>
    <div class="header-actions">
      <button class="cart-btn" onclick="toggleCart()" aria-label="Корзина">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="mob-toggle" onclick="document.getElementById('nav').classList.toggle('open')" aria-label="Меню">☰</button>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="breadcrumbs" id="breadcrumbs"></div>
  </div>

  <section class="prod-detail" id="productDetail">
    <div class="container">
      <div class="prod-detail-wrap" id="productContent">
        <div style="text-align:center;padding:80px;color:rgba(255,255,255,.3);grid-column:1/-1">Загрузка...</div>
      </div>
    </div>
  </section>
</main>

<footer class="footer-wrap">
  <div class="container">
    <div class="footer-links">
      <a href="/printforge/">Главная</a>
      <a href="/printforge/#catalog">Каталог</a>
      <a href="/printforge/pages/cart.html">Корзина</a>
    </div>
    <p>© 2026 PrintForge — 3D Моделист Конструктор</p>
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this)toggleCart()"></div>
<div class="cart-side" id="cartSide">
  <div class="cart-header"><h2>Корзина</h2><button class="cart-close" onclick="toggleCart()">✕</button></div>
  <div class="cart-items" id="cartItems"><div class="cart-empty">Загрузка...</div></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">Итого: <span id="cartTotal">0 ₽</span></div>
    <button class="cart-btn-primary" onclick="checkout()">Оформить заказ</button>
    <button class="cart-btn-secondary" onclick="clearCart()">Очистить</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/printforge/assets/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const id = parseInt(new URLSearchParams(window.location.search).get('id'));
  if (!id) return;

  // Wait for products to load
  const check = setInterval(() => {
    if (window.products && window.products.length) {
      clearInterval(check);
      renderProduct(id);
    }
  }, 100);
  setTimeout(() => clearInterval(check), 10000);

  // Load products if not loaded
  if (!window.products || !window.products.length) {
    try {
      const res = await fetch('https://sergio7708.github.io/jarvis-bot-store/products.json');
      window.products = await res.json();
      renderProduct(id);
    } catch (e) {
      document.getElementById('productContent').innerHTML =
        '<div style="text-align:center;padding:80px;color:rgba(255,255,255,.3);grid-column:1/-1">Ошибка загрузки</div>';
    }
  }
});

function renderProduct(id) {
  const p = window.products.find(x => x.id === id);
  const el = document.getElementById('productContent');
  if (!p) {
    el.innerHTML = '<div style="text-align:center;padding:80px;color:rgba(255,255,255,.3);grid-column:1/-1"><h2 style="font-size:40px;color:var(--gold);margin-bottom:16px">404</h2><p>Товар не найден</p><a href="/printforge/" style="color:var(--gold);display:inline-block;margin-top:16px">В каталог</a></div>';
    return;
  }

  document.title = `${p.title} — PrintForge`;

  el.innerHTML = `
    <div class="prod-detail-img reveal">
      <img src="https://sergio7708.github.io/jarvis-bot-store${p.photo_url}" alt="${p.title.replace(/"/g,'&quot;')}">
    </div>
    <div class="prod-detail-info reveal">
      <a href="/printforge/#catalog" class="prod-back">← Назад в каталог</a>
      <div class="prod-detail-cat">${p.category}</div>
      <h1>${p.title}</h1>
      <p class="prod-detail-desc">${p.desc || 'Подробности по запросу'}</p>
      <div class="prod-detail-price">${p.price.toLocaleString()} ₽</div>
      <button class="prod-detail-btn" onclick="addToCart(${p.id})">В корзину</button>
    </div>
  `;
}
</script>
</body>
</html>
